<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeFeed — Discord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=gg+sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-servers: #1e1f22;
            --bg-channels: #2b2d31;
            --bg-chat: #313338;
            --bg-hover: #35373c;
            --bg-msg-hover: #2e3035;
            --bg-input: #383a40;
            --border: #1e1f22;
            --text-primary: #dbdee1;
            --text-secondary: #949ba4;
            --text-muted: #6d6f78;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --online: #23a559;
            --idle: #f0b232;
            --dnd: #f23f42;
            --mention-bg: rgba(88,101,242,0.1);
            --mention-bar: #5865f2;
            --radius: 8px;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg-chat);
            color: var(--text-primary);
            font-family: 'Inter', 'gg sans', sans-serif;
            font-size: 15px;
            display: flex;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Server list ── */
        .server-list {
            width: 72px;
            flex-shrink: 0;
            background: var(--bg-servers);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            overflow-y: auto;
            scrollbar-width: none;
        }

            .server-list::-webkit-scrollbar {
                display: none;
            }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-channels);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-secondary);
            transition: border-radius 0.15s, background 0.15s;
            position: relative;
            flex-shrink: 0;
        }

            .server-icon:hover, .server-icon.active {
                border-radius: 30%;
                background: var(--accent);
                color: #fff;
            }

                .server-icon.active::before {
                    content: '';
                    position: absolute;
                    left: -16px;
                    width: 4px;
                    height: 40px;
                    background: #fff;
                    border-radius: 0 4px 4px 0;
                }

            .server-icon img {
                width: 100%;
                height: 100%;
                border-radius: inherit;
                object-fit: cover;
            }

        .server-sep {
            width: 32px;
            height: 2px;
            background: #35373c;
            border-radius: 1px;
            flex-shrink: 0;
        }

        /* ── Channel sidebar ── */
        .channel-sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--bg-channels);
            display: flex;
            flex-direction: column;
        }

        .server-name {
            padding: 0 16px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 15px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
        }

            .server-name svg {
                width: 18px;
                height: 18px;
                fill: var(--text-secondary);
            }

        .channel-section-label {
            padding: 16px 8px 4px 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            margin: 1px 8px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
        }

            .channel-item:hover {
                background: var(--bg-hover);
                color: var(--text-primary);
            }

            .channel-item.active {
                background: var(--bg-hover);
                color: var(--text-primary);
            }

            .channel-item svg {
                width: 18px;
                height: 18px;
                flex-shrink: 0;
                opacity: 0.7;
            }

        .sidebar-user {
            margin-top: auto;
            padding: 8px;
            background: #232428;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            position: relative;
        }

            .sidebar-user-avatar::after {
                content: '';
                position: absolute;
                bottom: -1px;
                right: -1px;
                width: 10px;
                height: 10px;
                background: var(--online);
                border-radius: 50%;
                border: 2px solid #232428;
            }

        .sidebar-user-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-user-name {
            font-size: 13px;
            font-weight: 600;
        }

        .sidebar-user-tag {
            font-size: 11px;
            color: var(--text-muted);
        }

        .sidebar-user-icons {
            display: flex;
            gap: 2px;
        }

            .sidebar-user-icons svg {
                width: 18px;
                height: 18px;
                fill: var(--text-secondary);
                cursor: pointer;
                padding: 2px;
                border-radius: 4px;
            }

                .sidebar-user-icons svg:hover {
                    fill: var(--text-primary);
                    background: var(--bg-hover);
                }

        /* ── Main chat area ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-chat);
        }

        /* Chat header */
        .chat-header {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-header-hash {
            color: var(--text-muted);
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
        }

        .chat-header-name {
            font-size: 15px;
            font-weight: 700;
        }

        .chat-header-sep {
            width: 1px;
            height: 24px;
            background: #4e5058;
            margin: 0 8px;
        }

        .chat-header-topic {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-icons {
            margin-left: auto;
            display: flex;
            gap: 4px;
        }

            .chat-header-icons svg {
                width: 24px;
                height: 24px;
                fill: var(--text-secondary);
                cursor: pointer;
                padding: 2px;
                border-radius: 4px;
            }

                .chat-header-icons svg:hover {
                    fill: var(--text-primary);
                }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0 8px;
            scroll-behavior: smooth;
        }

            .messages::-webkit-scrollbar {
                width: 8px;
            }

            .messages::-webkit-scrollbar-track {
                background: transparent;
            }

            .messages::-webkit-scrollbar-thumb {
                background: #1a1b1e;
                border-radius: 4px;
            }

        /* Date divider */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 16px 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
        }

            .date-divider::before, .date-divider::after {
                content: '';
                flex: 1;
                height: 1px;
                background: #3f4147;
            }

        /* Message group */
        .msg-group {
            padding: 2px 16px;
            display: flex;
            gap: 16px;
            position: relative;
        }

            .msg-group:hover {
                background: var(--bg-msg-hover);
            }

            .msg-group.first-in-group {
                margin-top: 16px;
            }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            cursor: pointer;
            margin-top: 2px;
        }

        .msg-avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            margin-top: 2px;
        }
        /* Continuation message — no avatar */
        .msg-group.continuation .msg-avatar,
        .msg-group.continuation .msg-avatar-placeholder {
            visibility: hidden;
        }

        .msg-group.continuation {
            margin-top: 0;
        }

            .msg-group.continuation:hover .msg-timestamp-inline {
                opacity: 1;
            }

        .msg-timestamp-inline {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-muted);
            width: 40px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
        }

        .msg-body {
            flex: 1;
            min-width: 0;
        }

        .msg-meta {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 2px;
        }

        .msg-username {
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

            .msg-username:hover {
                text-decoration: underline;
            }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .msg-text {
            font-size: 15px;
            line-height: 1.375;
            color: var(--text-primary);
            word-break: break-word;
        }

        .msg-group.continuation .msg-meta {
            display: none;
        }

        /* Attachment */
        .msg-attachment {
            margin-top: 8px;
            max-width: 520px;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            display: inline-block;
        }

            .msg-attachment img, .msg-attachment video {
                display: block;
                max-width: 100%;
                max-height: 350px;
                object-fit: contain;
                border-radius: var(--radius);
                background: #000;
            }

            .msg-attachment:hover img, .msg-attachment:hover video {
                filter: brightness(0.92);
            }

        /* Reactions */
        .msg-reactions {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .reaction {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 7px;
            background: #2e3035;
            border: 1px solid #3f4147;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.1s;
        }

            .reaction:hover {
                background: var(--bg-hover);
                border-color: var(--accent);
            }

            .reaction.reacted {
                background: var(--mention-bg);
                border-color: var(--accent);
                color: #8a92ff;
            }

            .reaction span {
                font-size: 12px;
                color: var(--text-secondary);
            }

        /* Message actions (on hover) */
        .msg-actions {
            position: absolute;
            right: 16px;
            top: -16px;
            background: var(--bg-channels);
            border: 1px solid #3f4147;
            border-radius: var(--radius);
            display: none;
            gap: 2px;
            padding: 4px;
            z-index: 10;
        }

        .msg-group:hover .msg-actions {
            display: flex;
        }

        .msg-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 16px;
            transition: background 0.1s, color 0.1s;
        }

            .msg-action-btn:hover {
                background: var(--bg-hover);
                color: var(--text-primary);
            }

            .msg-action-btn svg {
                width: 18px;
                height: 18px;
                fill: currentColor;
            }

        /* Chat input */
        .chat-input-wrap {
            padding: 0 16px 24px;
            flex-shrink: 0;
        }

        .chat-input {
            background: var(--bg-input);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 12px;
        }

        .input-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-secondary);
            cursor: pointer;
            flex-shrink: 0;
            padding: 2px;
            border-radius: 4px;
        }

            .input-icon:hover {
                fill: var(--text-primary);
            }

        .chat-input-field {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            padding: 11px 4px;
            resize: none;
            line-height: 1.375;
        }

            .chat-input-field::placeholder {
                color: var(--text-muted);
            }

        /* Members sidebar (right) */
        .members-sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--bg-channels);
            padding: 16px 8px;
            overflow-y: auto;
            scrollbar-width: none;
        }

            .members-sidebar::-webkit-scrollbar {
                display: none;
            }

        @media (max-width: 1100px) {
            .members-sidebar {
                display: none;
            }
        }

        @media (max-width: 680px) {
            .channel-sidebar {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .server-list {
                display: none;
            }
        }

        .members-section-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 0 8px 4px;
            margin-top: 8px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

            .member-item:hover {
                background: var(--bg-hover);
            }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }

        .member-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .member-avatar-svg {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .status-dot {
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--bg-channels);
        }

        .status-online {
            background: var(--online);
        }

        .status-idle {
            background: var(--idle);
        }

        .status-dnd {
            background: var(--dnd);
        }

        .status-offline {
            background: var(--text-muted);
        }

        .member-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .member-item:hover .member-name {
            color: var(--text-primary);
        }

        /* ── Image modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

            .modal-overlay.active {
                display: flex;
            }

            .modal-overlay img, .modal-overlay video {
                max-width: 90vw;
                max-height: 90vh;
                object-fit: contain;
                border-radius: var(--radius);
                cursor: default;
            }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #2e3035 25%, #35373c 50%, #2e3035 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>
<body>

    <!-- Server list -->
    <div class="server-list" id="serverList"></div>

    <!-- Channel sidebar -->
    <div class="channel-sidebar">
        <div class="server-name">
            <span>LeFeed</span>
            <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z" /></svg>
        </div>
        <div class="channel-section-label">Text Channels</div>
        <div class="channel-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6H4M20 12H4M20 18H4" /></svg>
            general
        </div>
        <div class="channel-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6H4M20 12H4M20 18H4" /></svg>
            random
        </div>
        <div class="channel-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6H4M20 12H4M20 18H4" /></svg>
            media-dump
            <span style="margin-left:auto;background:#f23f42;color:#fff;font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px">3</span>
        </div>
        <div class="channel-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6H4M20 12H4M20 18H4" /></svg>
            announcements
        </div>
        <div class="channel-section-label" style="margin-top:8px">Voice Channels</div>
        <div class="channel-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" /></svg>
            Lounge
        </div>
        <div class="channel-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" /></svg>
            Gaming
        </div>

        <!-- Sidebar user -->
        <div class="sidebar-user">
            <div class="sidebar-user-avatar" style="background:#5865f2">Y</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name">you</div>
                <div class="sidebar-user-tag">#0000</div>
            </div>
            <div class="sidebar-user-icons">
                <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" /></svg>
                <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" /></svg>
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" /></svg>
            </div>
        </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area">
        <div class="chat-header">
            <span class="chat-header-hash">#</span>
            <span class="chat-header-name">general</span>
            <div class="chat-header-sep"></div>
            <span class="chat-header-topic">The one place to share everything ✨</span>
            <div class="chat-header-icons">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" /></svg>
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1" /><circle cx="19" cy="12" r="1" /><circle cx="5" cy="12" r="1" /></svg>
            </div>
        </div>

        <div class="messages" id="messages">
            <div id="sentinel" style="height:13px"></div>
            <div class="date-divider" id="dateDivider">Today</div>
            <!-- messages injected here -->
        </div>

        <div class="chat-input-wrap">
            <div class="chat-input">
                <svg class="input-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="M8 13s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" /></svg>
                <input class="chat-input-field" type="text" placeholder="Message #general">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.64 16.2a2 2 0 0 1-2.83-2.83l8.49-8.48" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" /></svg>
                <svg class="input-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="M8 13s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" /></svg>
            </div>
        </div>
    </div>

    <!-- Members sidebar -->
    <div class="members-sidebar" id="membersSidebar"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal" onclick="closeModal()">
        <img id="modalImg" src="" alt="" style="display:none">
        <video id="modalVid" src="" controls style="display:none"></video>
    </div>

    <script>
        // ── Emoji sets for reactions ──────────────────────────────────────────────
        const REACTIONS = ['👍', '❤️', '😂', '🔥', '😮', '🎉', '💯', '👀', '😍', '🤔'];

        // ── Status types ─────────────────────────────────────────────────────────
        const STATUSES = ['online', 'online', 'online', 'idle', 'dnd', 'offline'];

        // ── Fake server icons ─────────────────────────────────────────────────────
        const FAKE_SERVERS = [
            { label: '⚡', color: '#5865f2', active: true },
            { label: '🎮', color: '#23a559' },
            { label: '🎨', color: '#f0b232' },
            { label: '🐱', color: '#f23f42' },
            { label: '🚀', color: '#eb459e' },
            { label: '+', color: '#36393f', isAdd: true },
        ];

        function buildServerList() {
            const el = document.getElementById('serverList');
            FAKE_SERVERS.forEach((s, i) => {
                if (i === FAKE_SERVERS.length - 1) {
                    const sep = document.createElement('div');
                    sep.className = 'server-sep';
                    el.appendChild(sep);
                }
                const icon = document.createElement('div');
                icon.className = 'server-icon' + (s.active ? ' active' : '');
                icon.style.background = s.color;
                icon.style.color = '#fff';
                icon.textContent = s.label;
                el.appendChild(icon);
            });
        }

        // ── Helpers ───────────────────────────────────────────────────────────────
        const rng = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

        function hslFromName(name) {
            let h = 0;
            for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffff;
            return `hsl(${Math.abs(h) % 360},55%,55%)`;
        }

        function initials(name) {
            return name.split(/[_\-\s]+/).slice(0, 2).map(w => w[0]?.toUpperCase() || '').join('');
        }

        function fakeTime() {
            const h = rng(0, 23).toString().padStart(2, '0');
            const m = rng(0, 59).toString().padStart(2, '0');
            return `Today at ${h}:${m}`;
        }

        function pickReactions() {
            const count = rng(0, 3);
            const emojis = [...REACTIONS].sort(() => Math.random() - 0.5).slice(0, count);
            return emojis.map(e => ({ emoji: e, count: rng(1, 12) }));
        }

        // ── Members sidebar ───────────────────────────────────────────────────────
        const knownUsers = {};

        function buildMembersSidebar() {
            const el = document.getElementById('membersSidebar');
            el.innerHTML = '';

            const online = Object.values(knownUsers).filter(u => ['online', 'idle', 'dnd'].includes(u.status));
            const offline = Object.values(knownUsers).filter(u => u.status === 'offline');

            function addSection(label, members) {
                if (!members.length) return;
                const lbl = document.createElement('div');
                lbl.className = 'members-section-label';
                lbl.textContent = `${label} — ${members.length}`;
                el.appendChild(lbl);
                members.forEach(u => {
                    const item = document.createElement('div');
                    item.className = 'member-item';
                    const color = hslFromName(u.username);
                    const inits = initials(u.username);
                    item.innerHTML = `
                        <div class="member-avatar">
                            ${u.avatar
                            ? `<img class="member-avatar-img" src="${u.avatar}" alt="">`
                            : `<svg class="member-avatar-svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="${color}"/><text x="16" y="21" text-anchor="middle" font-size="12" font-family="Inter,sans-serif" font-weight="700" fill="#fff">${inits}</text></svg>`}
                            <div class="status-dot status-${u.status}"></div>
                        </div>
                        <span class="member-name">${u.username}</span>
                    `;
                    el.appendChild(item);
                });
            }

            addSection('Online', online);
            addSection('Offline', offline);
        }

        // ── Render a single message group ─────────────────────────────────────────
        let lastUsername = null;

        function renderMessage(post, isContinuation) {
            const imagePath = '/files/' + post.image.replace(/\\/g, '/');
            const avatarPath = post.avatar ? '/files/' + post.avatar.replace(/\\/g, '/') : null;
            const color = hslFromName(post.username);
            const inits = initials(post.username);
            const reactions = pickReactions();
            const time = fakeTime();
            const isVideo = post.mediaType === 'video';

            // Register user
            if (!knownUsers[post.username]) {
                knownUsers[post.username] = {
                    username: post.username,
                    avatar: avatarPath,
                    status: STATUSES[rng(0, STATUSES.length - 1)],
                    color,
                };
            }

            const group = document.createElement('div');
            group.className = `msg-group${isContinuation ? ' continuation' : ' first-in-group'}`;

            const avatarHtml = avatarPath
                ? `<img class="msg-avatar" src="${avatarPath}" alt="" loading="lazy">`
                : `<svg class="msg-avatar-placeholder" viewBox="0 0 40 40" style="flex-shrink:0;margin-top:2px">
                      <circle cx="20" cy="20" r="20" fill="${color}"/>
                      <text x="20" y="26" text-anchor="middle" font-size="14" font-family="Inter,sans-serif" font-weight="700" fill="#fff">${inits}</text>
                   </svg>`;

            const reactionsHtml = reactions.length
                ? `<div class="msg-reactions">${reactions.map(r =>
                    `<div class="reaction" onclick="toggleReaction(this)">
                        ${r.emoji} <span>${r.count}</span>
                    </div>`).join('')}</div>`
                : '';

            group.innerHTML = `
                <span class="msg-timestamp-inline">${time.split(' ').pop()}</span>
                ${avatarHtml}
                <div class="msg-body">
                    <div class="msg-meta">
                        <span class="msg-username" style="color:${color}">${post.username}</span>
                        <span class="msg-time">${time}</span>
                    </div>
                    <div class="msg-text">${post.caption}</div>
                    <div class="msg-attachment" onclick="openModal('${imagePath}', ${isVideo})">
                        ${isVideo
                    ? `<video src="${imagePath}" loading="lazy" autoplay muted loop></video>`
                    : `<img src="${imagePath}" alt="" loading="lazy">`}
                    </div>
                    ${reactionsHtml}
                </div>
                <div class="msg-actions">
                    <div class="msg-action-btn" title="Add reaction" onclick="addReaction(this)">😄</div>
                    <div class="msg-action-btn" title="Reply">
                        <svg viewBox="0 0 24 24"><path d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 0 1 0 12h-3"/></svg>
                    </div>
                    <div class="msg-action-btn" title="More">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                    </div>
                </div>
            `;

            return group;
        }

        // ── Modal ─────────────────────────────────────────────────────────────────
        function openModal(src, isVideo) {
            const overlay = document.getElementById('modal');
            const img = document.getElementById('modalImg');
            const vid = document.getElementById('modalVid');
            if (isVideo) {
                img.style.display = 'none';
                vid.src = src;
                vid.style.display = 'block';
                vid.play();
            } else {
                vid.style.display = 'none';
                img.src = src;
                img.style.display = 'block';
            }
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            const vid = document.getElementById('modalVid');
            vid.pause();
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // ── Reactions ─────────────────────────────────────────────────────────────
        function toggleReaction(el) {
            el.classList.toggle('reacted');
            const span = el.querySelector('span');
            let n = parseInt(span.textContent);
            span.textContent = el.classList.contains('reacted') ? n + 1 : n - 1;
        }

        function addReaction(btn) {
            const emoji = REACTIONS[rng(0, REACTIONS.length - 1)];
            const body = btn.closest('.msg-group').querySelector('.msg-body');
            let reactRow = body.querySelector('.msg-reactions');
            if (!reactRow) {
                reactRow = document.createElement('div');
                reactRow.className = 'msg-reactions';
                body.appendChild(reactRow);
            }
            const r = document.createElement('div');
            r.className = 'reaction reacted';
            r.onclick = () => toggleReaction(r);
            r.innerHTML = `${emoji} <span>1</span>`;
            reactRow.appendChild(r);
        }

        // ── Load posts ────────────────────────────────────────────────────────────
        let isLoading = false;

        async function loadMessage() {
            if (isLoading) return;
            isLoading = true;
            try {
                const res = await fetch('/api/post/random/GUIDO');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const post = await res.json();

                const isContinuation = post.username === lastUsername && Math.random() > 0.4;
                lastUsername = post.username;

                const group = renderMessage(post, isContinuation);
                const msgs = document.getElementById('messages');
                const dateDivider = document.getElementById('dateDivider');

                // Remember scroll position before inserting so page doesn't jump
                const prevScrollHeight = msgs.scrollHeight;
                const prevScrollTop = msgs.scrollTop;

                // Insert right after the tinel (top of list) so each new message pushes existing ones down
                const sentinel = document.getElementById('sentinel');
                sentinel.insertAdjacentElement('afterend', group);

                // Restore scroll position so content doesn't jump when prepending
                const scrollDiff = msgs.scrollHeight - prevScrollHeight;
                msgs.scrollTop = prevScrollTop + scrollDiff;

                buildMembersSidebar();

            } catch (err) {
                console.error(err);
            } finally {
                isLoading = false;
            }
        }

        // Infinite scroll — load older messages when user scrolls near the TOP
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting && !isLoading)
                    for (let i = 0; i < 8; i++) {
                        loadMessage();
                        sleep(500);
                    }
            });
        }, { rootMargin: '300px' });
        observer.observe(document.getElementById('sentinel'));
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        async function init() {
            buildServerList();
            const msgs = document.getElementById('messages');
            for (let i = 0; i < 8; i++) {
                await loadMessage();
                await sleep(500);
            }
            // Scroll to bottom after initial load so newest messages are visible
            msgs.scrollTop = msgs.scrollHeight;
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
