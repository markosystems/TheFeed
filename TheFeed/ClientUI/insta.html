<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeFeed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --text: #f0f0f0;
            --muted: #888;
            --accent: #e0ff54;
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 480px;
            padding: 1.1rem 1rem;
            text-align: center;
            border-bottom: 0.5px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        /* add alongside the img rule */
        .post-image-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-style: italic;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            color: var(--accent);
        }

        .feed {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            padding-bottom: 5rem;
        }

        .post {
            border-bottom: 0.5px solid var(--border);
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.75rem 1rem;
        }

        .avatar-wrap {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-svg {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: block;
        }

        .post-user {
            font-size: 13.5px;
            font-weight: 600;
        }

        .post-time {
            font-size: 12px;
            color: var(--muted);
            margin-left: auto;
        }

        .post-image-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: var(--surface);
        }

            .post-image-wrap img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
                transition: transform 0.4s ease;
            }

            .post-image-wrap:hover img {
                transform: scale(1.03);
            }

        .post-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0.65rem 1rem 0.4rem;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--muted);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            transition: color 0.15s;
        }

            .action-btn:hover {
                color: var(--text);
            }

            .action-btn.liked {
                color: #f23955;
            }

            .action-btn svg {
                width: 22px;
                height: 22px;
                fill: none;
                stroke: currentColor;
                stroke-width: 1.6px;
            }

        .sentinel {
            height: 1px;
            margin: 2rem 0;
        }

        .action-btn.liked svg {
            fill: #f23955;
            stroke: #f23955;
        }

        .post-caption {
            padding: 0 1rem 1rem;
            font-family: 'DM Serif Display', serif;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.55;
            color: var(--text);
        }

            .post-caption strong {
                font-style: normal;
                font-family: 'DM Sans', sans-serif;
                font-size: 13px;
                margin-right: 6px;
            }

        .load-more {
            width: 100%;
            max-width: 480px;
            padding: 1rem;
            text-align: center;
        }

        .load-more-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: opacity 0.2s;
        }

            .load-more-btn:hover {
                opacity: 0.8;
            }
    </style>
</head>
<body>
    <header>
        <span class="logo">LeFeed</span>
    </header>

    <main class="feed" id="feed">
        <div class="sentinel" id="sentinel"></div>
    </main>

    <div class="controls">
        <button class="load-more-btn" onclick="loadPost()">New Post</button>
    </div>

    <script>
        let isLoading = false;

        async function loadPost() {
            if (isLoading) return;
            isLoading = true;

            try {
                const res = await fetch('/api/post/random/GUIDO');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const post = await res.json();

                const article = document.createElement('article');
                article.className = 'post';

                // Avatar
                let avatarHtml = '';
                if (post.avatar) {
                    avatarHtml = `<img class="avatar-img" src="/files/${post.avatar}" alt="">`;
                } else {
                    avatarHtml = `<svg class="avatar-svg" viewBox="0 0 34 34"><circle cx="17" cy="17" r="17" fill="${post.color}"/><text x="17" y="22" text-anchor="middle" font-size="11" font-family="DM Sans,sans-serif" font-weight="600" fill="#fff">${post.initials}</text></svg>`;
                }

                const likes = post.likes >= 1000 ? (post.likes / 1000).toFixed(1).replace(/\.0$/, '') + 'k' : post.likes;

                if (post.mediaType == "image") {
                    article.innerHTML = `
              <div class="post-header">
                <div class="avatar-wrap">${avatarHtml}</div>
                <span class="post-user">${post.username}</span>
                <span class="post-time">${post.timeAgo}</span>
              </div>
              <div class="post-image-wrap">
                <img src="/files/${post.image}" alt="" loading="lazy">
              </div>
              <div class="post-actions">
                <button class="action-btn" onclick="toggleLike(this)" aria-label="like">
                  <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                  <span>${likes}</span>
                </button>
                <button class="action-btn" aria-label="comment">
                  <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </button>
                <button class="action-btn" aria-label="share">
                  <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
                <button class="action-btn" aria-label="save">
                  <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                </button>
              </div>
              <p class="post-caption"><strong>${post.username}</strong>${post.caption}</p>
            `;
                }
                else if (post.mediaType == "video") {
                    article.innerHTML = `
  <div class="post-header">
    <div class="avatar-wrap">${avatarHtml}</div>
    <span class="post-user">${post.username}</span>
    <span class="post-time">${post.timeAgo}</span>
  </div>
  <div class="post-image-wrap">
    <video src="/files/${post.image}" alt="" loading="lazy" controls loop></video>
  </div>
  <div class="post-actions">
    <button class="action-btn" onclick="toggleLike(this)" aria-label="like">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>${likes}</span>
    </button>
    <button class="action-btn" aria-label="comment">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="action-btn" aria-label="share">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
    <button class="action-btn" aria-label="save">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
  <p class="post-caption"><strong>${post.username}</strong>${post.caption}</p>
`;
                }
                    

            // Insert before sentinel
            const sentinel = document.getElementById('sentinel');
            sentinel.parentNode.insertBefore(article, sentinel);
          } catch (err) {
            console.error('Error loading post:', err);
          } finally {
            isLoading = false;
          }
        }

        function toggleLike(btn) {
          btn.classList.toggle('liked');
          const span = btn.querySelector('span');
          const raw = span.textContent;
          let n = raw.endsWith('k') ? Math.round(parseFloat(raw) * 1000) : parseInt(raw);
          if (btn.classList.contains('liked')) { n++; } else { n--; }
          span.textContent = n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/, '') + 'k' : n;
        }

        // Intersection Observer for infinite scroll
        const sentinel = document.getElementById('sentinel');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting && !isLoading) {
              loadPost();
            }
          });
        }, { rootMargin: '200px' });

        observer.observe(sentinel);
            async function loadInitialPosts() {
                for (let i = 0; i < 4; i++) {
                    await loadPost();
                    await new Promise(resolve => setTimeout(resolve, 400));
                }
            }

            window.addEventListener('load', loadInitialPosts);
    </script>
</body>
</html>
